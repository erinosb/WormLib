name: wormlib
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # Core scientific stack via conda to avoid NumPy 2.x resolver drift.
  - numpy=1.26.4
  - pandas=2.3.3
  - scipy
  - scikit-image=0.23.2
  - scikit-learn
  - matplotlib
  - seaborn=0.13.2
  - numba=0.61.2
  - joblib=1.4.2
  - tqdm
  - pyyaml
  - pydantic=2.7.4
  - pillow
  - reportlab
  - pip:
      # Keep these pins aligned with requirements.txt and the tested WormLib env.
      - numpy==1.26.4
      - big-fish==0.6.2
      - cellpose==3.1.0
      - torch==2.4.1
      - torchvision==0.19.1
      - opencv-python-headless==4.10.0.84
      - nd2==0.10.3
      - tifffile==2025.6.11
      - ipykernel==6.29.5
      - ipywidgets==8.1.7
      - ipympl==0.9.8
      - plotly==6.3.1
